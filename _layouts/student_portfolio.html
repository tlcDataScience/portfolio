<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
  </head>
  <body>
    <!-- Optional Loader Overlay -->
    {% if page.show_loader %}
    <div id="loader-overlay">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <div id="loader-percentage" class="mt-3">0%</div>
      </div>
    </div>
    {% endif %}

    <div class="container py-5">{{ content }}</div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Accordion smooth scroll
        var accordionCollapseElements = document.querySelectorAll(
          ".accordion-collapse",
        );
        accordionCollapseElements.forEach(function (collapseEl) {
          collapseEl.addEventListener("shown.bs.collapse", function () {
            var header = this.previousElementSibling;
            if (header) {
              header.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
        });

        // Loader logic (only if loader exists)
        const loaderOverlay = document.getElementById("loader-overlay");
        const loaderPercent = document.getElementById("loader-percentage");

        if (loaderOverlay && loaderPercent) {
          const images = Array.from(document.images);
          const iframes = Array.from(document.querySelectorAll("iframe"));

          const totalAssets = images.length + iframes.length;
          let assetsLoaded = 0;

          if (totalAssets === 0) {
            // No assets, hide loader immediately
            loaderOverlay.style.display = "none";
          } else {
            function updateLoader() {
              assetsLoaded++;
              let percent = Math.round((assetsLoaded / totalAssets) * 100);
              if (percent > 100) percent = 100;
              loaderPercent.textContent = percent + "%";

              if (assetsLoaded >= totalAssets) {
                loaderOverlay.style.opacity = "0";
                loaderOverlay.style.transition = "opacity 0.5s ease";
                setTimeout(() => (loaderOverlay.style.display = "none"), 500);
              }
            }

            images.forEach((img) => {
              if (img.complete) updateLoader();
              else {
                img.addEventListener("load", updateLoader);
                img.addEventListener("error", updateLoader);
              }
            });

            iframes.forEach((iframe) => {
              let counted = false;
              function markLoaded() {
                if (!counted) {
                  counted = true;
                  updateLoader();
                }
              }
              iframe.addEventListener("load", markLoaded);
              setTimeout(markLoaded, 5000); // fallback
            });
          }
        }
      });
    </script>
  </body>
</html>
